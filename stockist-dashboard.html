<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockist Dashboard — PIL OTC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>

    authDomain: "chemist-order-collection.firebaseapp.com",
    databaseURL: "https://chemist-order-collection-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chemist-order-collection",
    storageBucket: "chemist-order-collection.firebasestorage.app",
    messagingSenderId: "758655877119",
    appId: "1:758655877119:web:62ee051b9a45b1a274b1ca"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
</script>
<style>
  :root{
    --blue:#00A0E3; --blue-deep:#0577A8; --blue-tint:#EAF6FC;
    --ink:#14181C; --ink-soft:#4A5560; --paper:#F7F9FA; --card:#FFFFFF;
    --line:#E2E8ED; --gold:#C9A961; --green:#1E8E5A; --red:#D64545;
    --shadow: 0 20px 50px -20px rgba(20,24,28,0.25); --radius:16px;
    --font-display:'Fraunces',Georgia,serif; --font-body:'Inter',-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --ink:#EDF1F4; --ink-soft:#A8B4BE; --paper:#0B0F13; --card:#141A1F;
    --line:#232B32; --blue-tint:#0F2733; --shadow:0 20px 50px -20px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--font-body); background:var(--paper); color:var(--ink); min-height:100vh;}
  .hidden{ display:none !important; }

  #loginScreen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card{
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:40px 32px; width:100%; max-width:380px; box-shadow:var(--shadow); text-align:center;
  }
  .login-card h2{ font-family:var(--font-display); font-size:24px; margin-bottom:6px; }
  .login-card p{ color:var(--ink-soft); font-size:13.5px; margin-bottom:26px; }
  .field{ text-align:left; margin-bottom:16px; }
  .field label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); display:block; margin-bottom:6px; }
  .field input{
    width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:10px;
    background:var(--paper); color:var(--ink); font-size:16px;
  }
  .field input:focus{ outline:none; border-color:var(--blue); }
  .btn{ width:100%; padding:14px; border:none; border-radius:10px; background:var(--blue); color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
  .btn:hover{ background:var(--blue-deep); }
  .btn:disabled{ opacity:.6; cursor:not-allowed; }
  .login-error{ color:var(--red); font-size:13px; margin-top:12px; min-height:16px; }

  #appScreen{ display:none; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:14px 20px;
    background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
  }
  .who-name{ font-weight:700; font-size:14.5px; }
  .who-meta{ font-size:11.5px; color:var(--ink-soft); }
  .top-actions{ display:flex; gap:8px; }
  .icon-btn{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line); background:var(--card);
    color:var(--ink-soft); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none;
  }
  .icon-btn:hover{ color:var(--blue); border-color:var(--blue); }

  main{ max-width:680px; margin:0 auto; padding:20px 16px 60px; }
  .section-title{ font-family:var(--font-display); font-size:19px; font-weight:600; margin:22px 0 12px; }
  .section-title:first-child{ margin-top:0; }

  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .stat-card{ background:var(--blue-tint); border-radius:12px; padding:14px; text-align:center; }
  .stat-num{ font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--blue-deep); }
  [data-theme="dark"] .stat-num{ color:var(--blue); }
  .stat-label{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; margin-top:3px; }

  .order-card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
  .order-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .order-chemist{ font-weight:700; font-size:15px; }
  .order-meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .order-amt{ font-family:var(--font-display); font-size:18px; font-weight:700; text-align:right; }
  .order-lines{ font-size:12.5px; color:var(--ink-soft); margin:8px 0; padding:10px; background:var(--paper); border-radius:8px; }
  .order-line-row{ display:flex; justify-content:space-between; padding:3px 0; }
  .order-actions{ display:flex; gap:8px; margin-top:10px; }
  .dl-btn{
    flex:1; padding:10px; border-radius:8px; border:1.5px solid var(--blue); background:var(--blue-tint);
    color:var(--blue-deep); font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  [data-theme="dark"] .dl-btn{ color:var(--blue); }
  .dl-btn:hover{ background:var(--blue); color:#fff; }
  .dl-btn svg{ width:15px; height:15px; }

  .dl-all{
    width:100%; padding:13px; border-radius:10px; border:none; background:var(--gold); color:#3A2E10;
    font-size:14px; font-weight:700; cursor:pointer; margin-bottom:16px;
  }

  .no-results{ padding:24px; text-align:center; color:var(--ink-soft); font-size:13.5px; }
</style>
</head>
<body data-theme="light">

<div id="loginScreen">
  <div class="login-card">
    <h2>Stockist Login</h2>
    <p>Enter your registered mobile number or email</p>
    <div class="field"><label>Mobile No. or Email</label><input type="text" id="stockistId" autocomplete="off"></div>
    <button class="btn" id="stockistLoginBtn">View My Orders</button>
    <div class="login-error" id="stockistLoginError"></div>
    <a href="index.html" style="display:block; margin-top:16px; font-size:13px; color:var(--ink-soft); text-decoration:none;">← Back to Login Options</a>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div>
      <div class="who-name" id="stkName">—</div>
      <div class="who-meta" id="stkMeta">—</div>
    </div>
    <div class="top-actions">
      <a href="index.html" class="icon-btn" aria-label="Back to gateway">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <button class="icon-btn" id="stkLogoutBtn" aria-label="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <main>
    <div class="grid3">
      <div class="stat-card"><div class="stat-num" id="statOrderCount">0</div><div class="stat-label">Orders</div></div>
      <div class="stat-card"><div class="stat-num" id="statTotalValue">₹0</div><div class="stat-label">Total Value</div></div>
      <div class="stat-card"><div class="stat-num" id="statChemistCount">0</div><div class="stat-label">Chemists</div></div>
    </div>

    <div class="section-title">Order History</div>
    <button class="dl-all" id="dlAllBtn">Download All Orders (Excel)</button>
    <div id="ordersList"><div class="no-results">Loading...</div></div>
  </main>
</div>

<script>
let currentStockist = null;
let currentOrders = [];

function money(n){ return '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:0}); }

document.getElementById('stockistLoginBtn').addEventListener('click', async ()=>{
  const idVal = document.getElementById('stockistId').value.trim().toLowerCase();
  const errEl = document.getElementById('stockistLoginError');
  errEl.textContent = '';
  if(!idVal){ errEl.textContent = 'Enter your mobile number or email.'; return; }

  const btn = document.getElementById('stockistLoginBtn');
  btn.disabled = true; btn.textContent = 'Checking...';

  try{
    if(!auth.currentUser){ await auth.signInAnonymously(); }
    const snap = await db.ref('stockists').once('value');
    const all = snap.val() || {};
    const match = Object.values(all).find(s =>
      (s.email && s.email.toLowerCase() === idVal) ||
      (s.mobile && String(s.mobile) === idVal)
    );
    if(!match){
      errEl.textContent = 'No stockist record found with that mobile/email. Contact your PIL SO.';
      btn.disabled = false; btn.textContent = 'View My Orders';
      return;
    }
    currentStockist = match;
    bootStockistDashboard();
  }catch(err){
    errEl.textContent = 'Login error: ' + err.message;
    btn.disabled = false; btn.textContent = 'View My Orders';
  }
});
document.getElementById('stkLogoutBtn').addEventListener('click', ()=> location.reload());

async function bootStockistDashboard(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('stkName').textContent = currentStockist.partyName;
  document.getElementById('stkMeta').textContent = `${currentStockist.town || ''} · SAP ${currentStockist.sapCode}`;

  const snap = await db.ref('orders').orderByChild('stockistSapCode').equalTo(currentStockist.sapCode).once('value');
  const box = document.getElementById('ordersList');
  if(!snap.exists()){
    box.innerHTML = '<div class="no-results">No orders received yet.</div>';
    updateStats([]);
    return;
  }
  currentOrders = Object.entries(snap.val()).map(([id, o]) => ({id, ...o})).sort((a,b) => b.timestamp - a.timestamp);
  renderOrders();
  updateStats(currentOrders);
}

function updateStats(orders){
  document.getElementById('statOrderCount').textContent = orders.length;
  document.getElementById('statTotalValue').textContent = money(orders.reduce((s,o)=>s+(o.total||0),0));
  document.getElementById('statChemistCount').textContent = new Set(orders.map(o=>o.chemist && o.chemist.chemistCode)).size;
}

function renderOrders(){
  const box = document.getElementById('ordersList');
  if(currentOrders.length === 0){ box.innerHTML = '<div class="no-results">No orders received yet.</div>'; return; }
  box.innerHTML = currentOrders.map(o => `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-chemist">${o.chemist ? o.chemist.chemistName : 'Unknown chemist'}</div>
          <div class="order-meta">${o.chemist ? (o.chemist.area||'') : ''} · via ${o.soName || 'SO'} · ${new Date(o.timestamp).toLocaleString('en-IN')}</div>
        </div>
        <div class="order-amt">${money(o.total)}</div>
      </div>
      <div class="order-lines">
        ${(o.lines||[]).map(l => `<div class="order-line-row"><span>${l.productName} × ${l.qty}</span><span>${money(l.ptd * l.qty * (1 - (l.schemePercent||0)/100))}</span></div>`).join('')}
      </div>
      <div class="order-actions">
        <button class="dl-btn" data-id="${o.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Excel
        </button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.dl-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> downloadOrderExcel(currentOrders.find(o=>o.id===btn.dataset.id)));
  });
}

function downloadOrderExcel(order){
  const rows = (order.lines||[]).map(l => ({
    'Item Code': l.itemCode,
    'Product Name': l.productName,
    'PTD (₹)': l.ptd,
    'Qty': l.qty,
    'Scheme %': l.schemePercent,
    'Net Amount (₹)': Math.round(l.ptd * l.qty * (1 - (l.schemePercent||0)/100))
  }));
  rows.push({}); // spacer
  rows.push({'Item Code': 'TOTAL', 'Net Amount (₹)': Math.round(order.total)});

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Order');
  const chemistName = (order.chemist ? order.chemist.chemistName : 'order').replace(/[^a-z0-9]/gi,'_');
  const dateStr = new Date(order.timestamp).toISOString().slice(0,10);
  XLSX.writeFile(wb, `Order_${chemistName}_${dateStr}.xlsx`);
}

document.getElementById('dlAllBtn').addEventListener('click', ()=>{
  if(currentOrders.length === 0) return;
  const rows = [];
  currentOrders.forEach(o => {
    (o.lines||[]).forEach(l => {
      rows.push({
        'Date': new Date(o.timestamp).toLocaleDateString('en-IN'),
        'Chemist': o.chemist ? o.chemist.chemistName : '',
        'Area': o.chemist ? o.chemist.area : '',
        'SO': o.soName || '',
        'Item Code': l.itemCode,
        'Product Name': l.productName,
        'PTD (₹)': l.ptd,
        'Qty': l.qty,
        'Scheme %': l.schemePercent,
        'Net Amount (₹)': Math.round(l.ptd * l.qty * (1 - (l.schemePercent||0)/100))
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'All Orders');
  XLSX.writeFile(wb, `${currentStockist.partyName.replace(/[^a-z0-9]/gi,'_')}_All_Orders.xlsx`);
});
</script>

</body>
</html>
